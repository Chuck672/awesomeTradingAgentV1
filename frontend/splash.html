<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AwesomeTradingAgent Loading</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0b0f14;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #00bfa5;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 30px;
    }
    .progress-container {
      width: 200px;
      height: 4px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background-color: #00bfa5;
      width: 30%;
      border-radius: 2px;
      animation: progress 2s ease-in-out infinite alternate;
    }
    @keyframes progress {
      0% { width: 10%; transform: translateX(0); }
      100% { width: 40%; transform: translateX(150px); }
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div class="title">AwesomeTradingAgent</div>
  <div class="subtitle">后端引擎正在加载，请稍候...</div>
  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>
</body>
</html>
