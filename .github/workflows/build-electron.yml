name: Build Electron Windows App

on:
  push:
    tags:
      - 'v*' # 仅在推送形如 v1.0.0 的 tag 时触发构建和发布
  workflow_dispatch: # 允许手动在 GitHub 页面点击触发

jobs:
  build-windows:
    runs-on: windows-latest # 重点：直接使用 GitHub 提供的 Windows 虚拟机，完美解决 wine 问题
    permissions:
      contents: write

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js & Electron
        run: npm run dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AwesomeChartV3-Windows
          path: |
            frontend/dist_electron/*.exe
            frontend/dist_electron/*.zip
            frontend/dist_electron/*-portable.exe

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/dist_electron/*.exe
            frontend/dist_electron/*.zip
