name: Build Electron Windows App

on:
  push:
    tags:
      - 'v*' # 仅在推送形如 v1.0.0 的 tag 时触发构建和发布
  workflow_dispatch: # 允许手动在 GitHub 页面点击触发

jobs:
  build-windows:
    runs-on: windows-latest # 重点：直接使用 GitHub 提供的 Windows 虚拟机，完美解决 wine 问题
    permissions:
      contents: write

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python Dependencies & PyInstaller
        working-directory: .
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python Backend
        working-directory: .
        run: |
          pyinstaller --onefile --name api-server --hidden-import="uvicorn.logging" --hidden-import="uvicorn.loops" --hidden-import="uvicorn.loops.auto" --hidden-import="uvicorn.protocols" --hidden-import="uvicorn.protocols.http" --hidden-import="uvicorn.protocols.http.auto" --hidden-import="uvicorn.protocols.websockets" --hidden-import="uvicorn.protocols.websockets.auto" --hidden-import="uvicorn.lifespan" --hidden-import="uvicorn.lifespan.on" run_backend.py
          New-Item -ItemType Directory -Force -Path frontend\extraResources
          Copy-Item dist\api-server.exe frontend\extraResources\

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Next.js & Electron
        run: npm run dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: awesomeTradingAgent-Windows
          path: |
            frontend/dist_electron/*.exe
            frontend/dist_electron/*.zip
            frontend/dist_electron/*-portable.exe

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/dist_electron/*.exe
            frontend/dist_electron/*.zip
